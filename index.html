<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>深圳市朔科科技有限公司</title>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 153, 255, 0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0, 255, 200, 0.12), transparent 30%),
        linear-gradient(135deg, #050816, #0c1224);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .navbar {
      width: 100%;
      padding: 24px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.2);
      z-index: 999;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .logo span {
      color: #2ed3ff;
    }

    .nav-right {
      color: #aaa;
      font-size: 14px;
    }

    .wrapper {
      max-width: 1350px;
      margin: auto;
      padding: 60px 30px;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }

    .left,
    .right {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 30px;
      backdrop-filter: blur(18px);
      box-shadow:
        0 0 40px rgba(0,0,0,0.25),
        inset 0 0 20px rgba(255,255,255,0.02);
    }

    .left {
      flex: 1;
      min-width: 340px;
      padding: 50px;
    }

    .right {
      flex: 1.2;
      min-width: 340px;
      padding: 50px;
    }

    .small-title {
      color: #2ed3ff;
      font-size: 15px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .main-title {
      font-size: 52px;
      font-weight: bold;
      margin-bottom: 22px;
      line-height: 1.2;
    }

    .desc {
      color: #9ea6b5;
      line-height: 1.8;
      margin-bottom: 45px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 28px;
      transition: 0.35s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      background: rgba(46,211,255,0.08);
      border-radius: 50%;
      top: -50px;
      right: -50px;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(46,211,255,0.4);
      box-shadow: 0 10px 30px rgba(46,211,255,0.12);
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f7bff, #2ed3ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(46,211,255,0.25);
    }

    .card h3 {
      margin-bottom: 12px;
      font-size: 24px;
    }

    .card p {
      color: #9ea6b5;
      line-height: 1.8;
      word-break: break-word;
    }

    .form-title {
      font-size: 44px;
      margin-bottom: 18px;
    }

    .form-desc {
      color: #9ea6b5;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .input-group {
      flex: 1;
      min-width: 220px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #d6d6d6;
      font-size: 14px;
    }

    input,
    textarea {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: white;
      outline: none;
      transition: 0.3s;
      font-size: 15px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #2ed3ff;
      box-shadow: 0 0 0 4px rgba(46,211,255,0.12);
    }

    button {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #0f66ff, #2ed3ff);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.35s;
      box-shadow: 0 12px 30px rgba(15,102,255,0.35);
    }

    button:hover {
      transform: translateY(-3px);
      opacity: 0.92;
    }

    .footer {
      text-align: center;
      padding: 40px 20px;
      color: #7f8796;
      font-size: 14px;
    }

    @media (max-width: 768px) {

      .navbar {
        padding: 20px;
      }

      .wrapper {
        padding: 30px 18px;
      }

      .main-title,
      .form-title {
        font-size: 36px;
      }

      .left,
      .right {
        padding: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">
      朔科<span>科技</span>
    </div>

    <div class="nav-right">
      Shenzhen Shuoke Technology
    </div>
  </div>

  <div class="wrapper">

    <!-- 左侧 -->
    <div class="left">

      <div class="small-title">CONTACT US</div>

      <div class="main-title">
        联系我们
      </div>

      <div class="desc">
        如果您有合作需求、技术咨询或业务沟通，
        欢迎通过以下方式联系我们，我们将尽快回复您。
      </div>

      <div class="card-grid">

        <div class="card">
          <div class="icon">📞</div>
          <h3>联系电话</h3>
          <p>18682478482</p>
        </div>

        <div class="card">
          <div class="icon">📧</div>
          <h3>电子邮箱</h3>
          <p>yissacyx@163.com</p>
        </div>

        <div class="card">
          <div class="icon">📍</div>
          <h3>公司地址</h3>
          <p>深圳市龙华区龙胜时代大厦</p>
        </div>

        <div class="card">
          <div class="icon">💬</div>
          <h3>Telegram</h3>
          <p>@shangxiong</p>
        </div>

      </div>

    </div>

    <!-- 右侧 -->
    <div class="right">

      <div class="small-title">MESSAGE</div>

      <div class="form-title">
        留言咨询
      </div>

      <div class="form-desc">
        填写以下表单，我们将在 1-3 个工作日内与您联系。
      </div>

      <form id="contact-form">

        <div class="form-row">

          <div class="input-group">
            <label>姓名</label>
            <input type="text" id="name" required placeholder="请输入您的姓名">
          </div>

          <div class="input-group">
            <label>电话</label>
            <input type="text" id="phone" placeholder="请输入您的电话">
          </div>

        </div>

        <div class="form-row">

          <div class="input-group">
            <label>邮箱</label>
            <input type="email" id="email" required placeholder="请输入您的邮箱">
          </div>

        </div>

        <div class="form-row">

          <div class="input-group">
            <label>留言内容</label>
            <textarea id="message" placeholder="请输入您的留言内容"></textarea>
          </div>

        </div>

        <button type="submit">
          发送消息 →
        </button>

      </form>

    </div>

  </div>

  <div class="footer">
    © 2026 深圳市朔科科技有限公司 版权所有
  </div>

  <script>

    emailjs.init("7Hp3r7-apyTmUsgYb");

    document
      .getElementById("contact-form")
      .addEventListener("submit", function(event) {

        event.preventDefault();

        const btn = document.querySelector("button");

        btn.innerHTML = "发送中...";
        btn.disabled = true;

        const params = {
          name: document.getElementById("name").value,
          phone: document.getElementById("phone").value,
          email: document.getElementById("email").value,
          message: document.getElementById("message").value
        };

        emailjs.send(
          "service_335990b",
          "template_4o1ws51",
          params
        )
        .then(function () {

          alert("发送成功，我们会尽快联系您！");

          document.getElementById("contact-form").reset();

          btn.innerHTML = "发送消息 →";
          btn.disabled = false;

        })
        .catch(function(error) {

          console.error(error);

          alert("发送失败，请稍后重试");

          btn.innerHTML = "发送消息 →";
          btn.disabled = false;

        });

      });

  </script>

</body>
</html>
