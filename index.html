<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>联系我们</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #071224, #0c1b35);
      color: #fff;
      min-height: 100vh;
      padding: 40px;
    }

    .container {
      max-width: 1300px;
      margin: auto;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }

    .left,
    .right {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .left {
      flex: 1;
      min-width: 320px;
    }

    .right {
      flex: 1.2;
      min-width: 320px;
    }

    .small-title {
      color: #27c1ff;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .main-title {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .desc {
      color: #aaa;
      margin-bottom: 40px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 30px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #27c1ff;
    }

    .icon {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f7bff, #2ed3ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card h3 {
      margin-bottom: 12px;
      font-size: 26px;
    }

    .card p {
      color: #aaa;
      line-height: 1.8;
      word-break: break-all;
    }

    .form-title {
      font-size: 42px;
      margin-bottom: 20px;
    }

    .form-desc {
      color: #aaa;
      margin-bottom: 40px;
    }

    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .input-group {
      flex: 1;
      min-width: 220px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #ddd;
    }

    input,
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px;
      color: #fff;
      outline: none;
      font-size: 15px;
    }

    textarea {
      height: 140px;
      resize: none;
    }

    input:focus,
    textarea:focus {
      border-color: #27c1ff;
    }

    button {
      width: 100%;
      margin-top: 20px;
      background: linear-gradient(90deg, #0f66ff, #2ed3ff);
      border: none;
      border-radius: 999px;
      padding: 18px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      .main-title,
      .form-title {
        font-size: 34px;
      }

      .container {
        flex-direction: column;
      }
    }
  </style>
</head>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

  // 初始化 EmailJS
  emailjs.init("7Hp3r7-apyTmUsgYb");

  // 表单提交
  document
    .getElementById("contact-form")
    .addEventListener("submit", function(event) {

      event.preventDefault();

      const btn = document.querySelector("button");

      btn.innerHTML = "发送中...";
      btn.disabled = true;

      const params = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };

      emailjs.send(
        "service_335990b",
        "template_4o1ws51",
        params
      )
      .then(function () {

        alert("发送成功！");

        document.getElementById("contact-form").reset();

        btn.innerHTML = "发送消息 →";
        btn.disabled = false;

      })
      .catch(function(error) {

        console.error(error);

        alert("发送失败，请稍后重试");

        btn.innerHTML = "发送消息 →";
        btn.disabled = false;

      });

    });

</script>

<body>

  <div class="container">

    <!-- 左侧 -->
    <div class="left">

      <div class="small-title">联系方式</div>

      <div class="main-title">联系信息</div>

      <div class="desc">
        我们期待与您的沟通
      </div>

      <div class="card-grid">

        <div class="card">
          <div class="icon">📞</div>
          <h3>联系电话</h3>
          <p>18888888888</p>
        </div>

        <div class="card">
          <div class="icon">📧</div>
          <h3>电子邮箱</h3>
          <p>example@email.com</p>
        </div>

        <div class="card">
          <div class="icon">📍</div>
          <h3>公司地址</h3>
          <p>深圳市南山区科技园</p>
        </div>

        <div class="card">
          <div class="icon">💬</div>
          <h3>Telegram</h3>
          <p>@yourtelegram</p>
        </div>

      </div>
    </div>

    <!-- 右侧 -->
    <div class="right">

      <div class="small-title">发送消息</div>

      <div class="form-title">留言咨询</div>

      <div class="form-desc">
        填写以下表单，我们将尽快回复您
      </div>

     <form id="contact-form">

  <div class="form-row">

    <div class="input-group">
      <label>姓名</label>
      <input
        type="text"
        id="name"
        placeholder="请输入您的姓名"
        required
      >
    </div>

    <div class="input-group">
      <label>电话</label>
      <input
        type="text"
        id="phone"
        placeholder="请输入您的电话"
      >
    </div>

  </div>

  <div class="form-row">

    <div class="input-group">
      <label>邮箱</label>
      <input
        type="email"
        id="email"
        placeholder="请输入您的邮箱"
        required
      >
    </div>

  </div>

  <div class="form-row">

    <div class="input-group">
      <label>留言内容</label>
      <textarea
        id="message"
        placeholder="请输入您的留言内容"
      ></textarea>
    </div>

  </div>

  <button type="submit">
    发送消息 →
  </button>

</form>

    </div>

  </div>

</body>
</html>
